image: node:20

stages:
  - deploy

deploy-apex:
  stage: deploy

  before_script:
    - echo "Checking Node.js and npm"
    - node --version
    - npm --version

    - echo "Installing Salesforce CLI"
    - npm install --global @salesforce/cli

    - echo "Checking Salesforce CLI"
    - sf --version

    - echo "Logging into Salesforce using JWT"
    - sf org login jwt --username "$SF_USERNAME" --client-id "$SF_CLIENT_ID" --jwt-key-file "$SF_JWT_KEY" --instance-url "$SF_INSTANCE_URL" --alias target-org

  script:
    - echo "Deploying Apex class"
    - sf project deploy start --metadata ApexClass:devopsCICDPracticeClass --target-org target-org