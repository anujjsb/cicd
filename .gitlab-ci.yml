image: salesforce/cli:latest-full

stages:
 - scan
 - validationDeployment

pmd-checks:
  image:
   name: pmdcode/pmd:7.24.0
   entrypoint: [""]
  stage: scan
  allow_failure: true
  # before_script:
  #  - echo "Checking Node.js and npm"
  #  - node --version
  #  - npm --version

  #  - echo "Checking Salesforce CLI"
  #  - sf --version

  script:
    - echo "pmd checks start"
    - pmd check -d force-app/main/default/classes -R config/pmd-ruleset.xml -f xml -r pmd-report.xml 
    - echo "pmd scan completed!"
  
  artifacts:
   when: always
   paths: 
    - pmd-report.xml
   expire_in: 1 week


validation-deployment:
    stage: validationDeployment
    before_script:
     - echo "Checking Node.js and npm in validationDeployment!"
     - node --version
     - npm --version

     - echo "Checking Salesforce CLI"
     - sf --version

     - echo "Logging into Salesforce using JWT for deploy-job"
     - echo "username is -> $USERNAME"
     - echo "client id is -> $CLIENTID"
     - echo "jwt key is -> $JWTKEY"
     - echo "instance url is -> $INSTANCEURL"
     - sf org login jwt --username "$USERNAME" --client-id "$CLIENTID" --jwt-key-file "$JWTKEY" --instance-url "$INSTANCEURL" --alias target-org

    script:

     - echo "Before deploy - "
     - echo "pmd report is -> "
     - cat pmd-report.xml
     - sf project deploy start --manifest manifest/package.xml --target-org target-org
     - echo "After deploy to target-org successfully!"
     - echo "Temp echo message!" 






