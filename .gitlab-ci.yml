image: node:20

stages:
  - retrieve
  - deploy

production-retrieve:
  stage: retrieve

  before_script:
   - echo "Checking Node.js and npm"
   - node --version
   - npm --version

   - echo "Installing Salesforce CLI"
   - npm install --global @salesforce/cli

   - echo "Checking Salesforce CLI"
   - sf --version

   - echo 'Source org login Start!'
   - sf org login jwt --username "$SOURCE_USERNAME" --client-id "$SOURCE_CLIENT_ID" --jwt-key-file "$SOURCE_JWT_KEY" --instance-url $https://login.salesforce.com --alias myOrg
   - echo 'Source org successfully login!'

  script:
    - echo 'Retriving an apex class from source org!'
    - sf project retrieve start --metadata ApexClass:exampleApex --target-org myOrg
    - echo 'successfully retrieve example apex class!'
    
  artifacts:
    paths:
     - force-app/
    expire_in: 1 hour

production-deploy:
  stage: deploy

  environment:
    name: production

  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual

  before_script:
    - echo "Checking Node.js and npm"
    - node --version
    - npm --version

    - echo "Installing Salesforce CLI"
    - npm install --global @salesforce/cli

    - echo "Checking Salesforce CLI"
    - sf --version

    - echo "Logging into Salesforce using JWT"
    - sf org login jwt --username "$SF_USERNAME" --client-id "$SF_CLIENT_ID" --jwt-key-file "$SF_JWT_KEY" --instance-url "$SF_INSTANCE_URL" --alias target-org

  script:
    - echo "Deploying Apex classes"
    - sf project deploy start --metadata ApexClass:devopsCICDPracticeClass --metadata ApexClass:devopsCICDClass2 --target-org target-org

    - echo "deploy service1 object"
    - sf project deploy start --metadata CustomObject:service1__c --target-org target-org

    - echo "Deploying dependencies object and layouts"
    - sf project deploy start --metadata CustomObject:subscription_plan__c --metadata CustomObject:customer2__c --metadata CustomObject:customer_subscription__c --target-org target-org

    - echo "Deploying addOn__c object"
    - sf project deploy start --metadata CustomObject:addOn__c --metadata CustomObject:payment2__c --target-org target-org

    - echo "Deploying addOn__c layout"
    - sf project deploy start --metadata Layout:addOn__c-Storage Layout --target-org target-org

    # - echo "adding custom field to addOn__c object"
    # - sf project deploy start --metadata "CustomField:addOn__c.praticeDevOps__c" --target-org target-org

    - echo 'Deployment of ExampleApex start!'
    - sf project deploy start --metadata ApexClass:exampleApex --target-org target-org
    - echo 'Deployment finished for exampleApex class!'